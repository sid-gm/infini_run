<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ragdoll Lab</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #14171c; font-family: ui-sans-serif, system-ui, sans-serif; }
  #app { position: fixed; inset: 0; }
  .panel {
    position: fixed; z-index: 10;
    background: rgba(20, 23, 28, 0.85); color: #e8e6e1;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
    padding: 14px 16px; backdrop-filter: blur(6px);
  }
  #hud { top: 14px; left: 14px; width: 250px; }
  #hud h1 { font-size: 15px; margin: 0 0 4px; letter-spacing: 0.02em; }
  #hud p { font-size: 12px; line-height: 1.5; margin: 6px 0 10px; color: #a8adb5; }
  #status { font-size: 12px; font-weight: 600; margin: 0 0 10px; color: #8fd18f; }
  #status.down { color: #d1a08f; }
  button {
    display: block; width: 100%; margin: 6px 0; padding: 8px 10px;
    font-size: 13px; font-weight: 600; color: #14171c;
    background: #e8e6e1; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #ffffff; }
  button.secondary { background: transparent; color: #e8e6e1; border: 1px solid rgba(255,255,255,0.25); }
  button.secondary:hover { background: rgba(255,255,255,0.08); }
  button:disabled { opacity: 0.4; cursor: default; }
  .camrow { display: flex; gap: 6px; }
  .camrow button { flex: 1; width: auto; margin: 6px 0; }
  #cmd {
    width: 100%; box-sizing: border-box; margin-top: 10px; padding: 8px;
    font-size: 12px; font-family: inherit; color: #e8e6e1; resize: vertical;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
  }
  #specView {
    width: 100%; box-sizing: border-box; margin: 8px 0 0; padding: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10px; line-height: 1.4; color: #9fb8d8; resize: vertical;
    min-height: 96px; max-height: 220px;
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
  }
  #specView:focus { outline: none; border-color: rgba(143,209,143,0.6); }
  #cmdError { font-size: 11px; color: #e09090; margin: 6px 0 0; white-space: pre-wrap; }
  .sliderrow { margin: 8px 0 2px; font-size: 11px; color: #a8adb5; }
  .sliderrow label { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .sliderrow #bounceVal { color: #e8e6e1; font-variant-numeric: tabular-nums; }
  .sliderrow input[type=range] { width: 100%; margin: 0; accent-color: #8fd18f; cursor: pointer; }
  #results { top: 14px; right: 14px; width: 300px; max-height: calc(100vh - 48px); display: flex; flex-direction: column; }
  #results h1 { font-size: 15px; margin: 0 0 8px; }
  #batchStatus { font-size: 12px; color: #a8adb5; margin-bottom: 6px; }
  #summary { font-size: 12px; line-height: 1.6; margin-bottom: 8px; }
  #runsTable { overflow-y: auto; flex: 1; }
  .run {
    font-size: 11px; padding: 5px 8px; margin: 2px 0; border-radius: 6px;
    background: rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; gap: 8px;
  }
  .run:hover { background: rgba(255,255,255,0.14); }
  .run.playing { background: rgba(143,209,143,0.22); box-shadow: inset 2px 0 0 #8fd18f; }
  .run .tag { color: #8fd18f; } .run .tag.no { color: #7d838c; }
  button.playall {
    display: inline-block; width: auto; margin: 8px 0 0; padding: 4px 12px;
    font-size: 11px; border-radius: 6px; vertical-align: middle;
    color: #14171c; background: #8fd18f;
  }
  button.playall:hover { background: #a6e0a6; }
  button.playall.stop { background: #d1a08f; color: #14171c; }
  button.playall.stop:hover { background: #e0b3a3; }
  .looplen { font-size: 11px; color: #a8adb5; margin-left: 8px; vertical-align: middle; white-space: nowrap; }
  .looplen input {
    width: 42px; margin: 0 3px; padding: 3px 5px; font-size: 11px; font-family: inherit; text-align: center;
    color: #e8e6e1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 5px;
  }
  #savedList { max-height: 200px; overflow-y: auto; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  #savedList .hint { font-size: 11px; color: #a8adb5; margin: 2px 0 5px; display: flex; justify-content: space-between; }
  #savedList .hint a { color: #d1a08f; cursor: pointer; }
  .run .when { color: #7d838c; }
  .run .del {
    background: transparent; color: #7d838c; border: none;
    width: auto; margin: 0; padding: 0 2px; font-size: 14px; line-height: 1; cursor: pointer;
  }
  .run .del:hover { color: #e09090; }
  .run .sw { color: #e3cf9a; font-variant-numeric: tabular-nums; font-weight: 600; }
  .sweepnote { font-size: 11px; color: #e3cf9a; margin-bottom: 4px; }
  .cmdhints { font-size: 10.5px; color: #7d838c; margin: 4px 0 0; line-height: 1.7; }
  .cmdhints b { color: #a8adb5; font-weight: 600; margin-right: 3px; }
  .cmdhints a { color: #9fb8d8; cursor: pointer; margin-right: 10px; white-space: nowrap; }
  .cmdhints a:hover { color: #cfe0f4; text-decoration: underline; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>
</head>
<body>
<div id="app"></div>

<div id="hud" class="panel">
  <p id="status"></p>
  <button id="reset" class="secondary">Reset scene</button>
  <div class="camrow">
    <button id="camIso" class="secondary">Isometric</button>
    <button id="camFree" class="secondary">Free camera</button>
  </div>
  <div class="sliderrow">
    <label for="bounce">Bounciness <span id="bounceVal">0.05</span></label>
    <input type="range" id="bounce" min="0" max="1" step="0.05" value="0.05" />
  </div>
  <textarea id="cmd" rows="2" placeholder='e.g. throw the box at the human 100 times at 50 mph'></textarea>
  <button id="interpret">Interpret with AI</button>
  <div id="cmdHints" class="cmdhints">
    <div><b>runs:</b> repeat the same throw N times → <a data-fill="throw the box at the human 50 times at 30 mph">"…50 times at 30 mph"</a></div>
    <div><b>sweep:</b> ramp one value across runs → <a data-fill="sweep the box speed from 1 to 100 mph over 50 runs">"sweep speed 1 → 100 mph over 50 runs"</a></div>
  </div>
  <button id="loadTests" class="secondary">Load saved tests</button>
  <div id="cmdError" hidden></div>
  <textarea id="specView" spellcheck="false" placeholder="Edit the spec, then run it." hidden></textarea>
  <button id="runSpec" hidden>Run this spec ▸</button>
</div>

<div id="results" class="panel" hidden>
  <h1>Results</h1>
  <div id="savedList" hidden></div>
  <div id="batchStatus"></div>
  <div id="summary"></div>
  <div id="runsTable"></div>
</div>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// ---------- renderer / scene ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14171c);
scene.fog = new THREE.Fog(0x14171c, 12, 30);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.set(3.2, 2.2, 4.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI * 0.495;

function setIsometricView() {
  const d = camera.position.distanceTo(controls.target);
  const dir = new THREE.Vector3(1, 0.9, 1).normalize().multiplyScalar(d);
  camera.position.copy(controls.target).add(dir);
  controls.update();
}
function setFreeView() {
  camera.position.set(3.2, 2.2, 4.2);
  controls.target.set(0, 1, 0);
  controls.update();
}

scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x30281e, 0.7));
const sun = new THREE.DirectionalLight(0xfff2df, 2.2);
sun.position.set(5, 8, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -8; sun.shadow.camera.right = 8;
sun.shadow.camera.top = 8; sun.shadow.camera.bottom = -8;
scene.add(sun);

const groundMesh = new THREE.Mesh(
  new THREE.CircleGeometry(14, 64).rotateX(-Math.PI / 2),
  new THREE.MeshStandardMaterial({ color: 0x23272e, roughness: 0.95 })
);
groundMesh.receiveShadow = true;
scene.add(groundMesh);
scene.add(new THREE.GridHelper(28, 56, 0x3a4149, 0x2a2f36));

// ---------- physics world ----------
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = true;
world.solver.iterations = 15;
world.defaultContactMaterial.friction = 0.4;
world.defaultContactMaterial.restitution = 0.05;

world.addBody(new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), quaternion: new CANNON.Quaternion().setFromEuler(-Math.PI / 2, 0, 0) }));

// ---------- shared state ----------
let standing = false;      // frozen-until-impact flag for the mannequin
let metricsRec = null;     // active metrics recorder during a simulated run
let busy = false;          // a batch is being simulated
let replayStepsLeft = 0;   // deterministic fixed-step replay countdown
let playState = null;      // sequential "play all" walker: { idx, frames, restFrames, limitFrames }
let loopSeconds = 0;       // fixed seconds per run in "play all" (0 = play until motion settles)
let lastBatch = null;      // { spec, baseSnap, results }
let ragdoll = { parts: [], joints: [] };
let partByName = {};
let props = [];
let propCounter = 0;

const statusEl = document.getElementById('status');
function updateStatus() {
  statusEl.textContent = standing ? '● Standing — drop something on it' : '○ Ragdoll — reset to stand it back up';
  statusEl.classList.toggle('down', !standing);
}

// Deterministic per-run randomness: same seed → same outcome.
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---------- physics + visuals sync ----------
const dynamic = []; // { body, mesh, ... }

function link(body, mesh) {
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  world.addBody(body);
  const entry = { body, mesh };
  dynamic.push(entry);
  return entry;
}

function unlink(entry) {
  world.removeBody(entry.body);
  scene.remove(entry.mesh);
  const i = dynamic.indexOf(entry);
  if (i !== -1) dynamic.splice(i, 1);
}

// ---------- mannequin ragdoll ----------
const skin = new THREE.MeshStandardMaterial({ color: 0xe8e2d6, roughness: 0.6, metalness: 0.05 });

function freezeRagdoll() {
  standing = true;
  for (const part of ragdoll.parts) {
    part.body.mass = 0;
    part.body.type = CANNON.Body.STATIC;
    part.body.velocity.setZero();
    part.body.angularVelocity.setZero();
    part.body.updateMassProperties();
  }
  updateStatus();
}

function releaseRagdoll() {
  if (!standing) return;
  standing = false;
  if (metricsRec) metricsRec.releasedAt = metricsRec.t;
  for (const part of ragdoll.parts) {
    part.body.mass = part.mass;
    part.body.type = CANNON.Body.DYNAMIC;
    part.body.updateMassProperties();
    part.body.wakeUp();
  }
  updateStatus();
}

function ragdollPart(name, halfExtents, position, mass, shape = 'box') {
  let cShape, geometry;
  if (shape === 'sphere') {
    cShape = new CANNON.Sphere(halfExtents.x);
    geometry = new THREE.SphereGeometry(halfExtents.x, 24, 18);
  } else {
    cShape = new CANNON.Box(new CANNON.Vec3(halfExtents.x, halfExtents.y, halfExtents.z));
    geometry = new RoundedBoxGeometry(halfExtents.x * 2, halfExtents.y * 2, halfExtents.z * 2, 4, Math.min(halfExtents.x, halfExtents.y, halfExtents.z) * 0.6);
  }
  const body = new CANNON.Body({
    mass,
    shape: cShape,
    position: new CANNON.Vec3(position.x, position.y, position.z),
    linearDamping: 0.08,
    angularDamping: 0.2,
  });
  body.addEventListener('collide', (e) => {
    const impact = Math.abs(e.contact.getImpactVelocityAlongNormal());
    if (metricsRec && e.body.isProp) {
      if (metricsRec.firstHitT === null) metricsRec.firstHitT = metricsRec.t;
      if (impact > metricsRec.maxImpact) metricsRec.maxImpact = impact;
    }
    if (standing && impact > 1.2) releaseRagdoll();
  });
  const entry = link(body, new THREE.Mesh(geometry, skin));
  entry.mass = mass;
  ragdoll.parts.push(entry);
  partByName[name] = entry;
  return body;
}

function coneTwist(bodyA, bodyB, pivotA, pivotB, axis, angle, twistAngle) {
  const joint = new CANNON.ConeTwistConstraint(bodyA, bodyB, {
    pivotA: new CANNON.Vec3(...pivotA),
    pivotB: new CANNON.Vec3(...pivotB),
    axisA: new CANNON.Vec3(...axis),
    axisB: new CANNON.Vec3(...axis),
    angle,
    twistAngle,
  });
  joint.collideConnected = false;
  world.addConstraint(joint);
  ragdoll.joints.push(joint);
}

function buildRagdoll() {
  const v = (x, y, z) => ({ x, y, z });
  const Y = -0.21; // drop the pose so the feet rest on the ground

  const pelvis = ragdollPart('pelvis', v(0.16, 0.11, 0.09), v(0, 1.05 + Y, 0), 8);
  const torso  = ragdollPart('torso',  v(0.17, 0.20, 0.09), v(0, 1.38 + Y, 0), 10);
  const head   = ragdollPart('head',   v(0.14, 0.14, 0.14), v(0, 1.75 + Y, 0), 4, 'sphere');

  const upperArmL = ragdollPart('upperArmL', v(0.15, 0.05, 0.05), v(-0.34, 1.52 + Y, 0), 1.5);
  const upperArmR = ragdollPart('upperArmR', v(0.15, 0.05, 0.05), v( 0.34, 1.52 + Y, 0), 1.5);
  const lowerArmL = ragdollPart('lowerArmL', v(0.14, 0.045, 0.045), v(-0.65, 1.52 + Y, 0), 1);
  const lowerArmR = ragdollPart('lowerArmR', v(0.14, 0.045, 0.045), v( 0.65, 1.52 + Y, 0), 1);

  const upperLegL = ragdollPart('upperLegL', v(0.07, 0.17, 0.07), v(-0.09, 0.75 + Y, 0), 4);
  const upperLegR = ragdollPart('upperLegR', v(0.07, 0.17, 0.07), v( 0.09, 0.75 + Y, 0), 4);
  const lowerLegL = ragdollPart('lowerLegL', v(0.06, 0.17, 0.06), v(-0.09, 0.39 + Y, 0), 3);
  const lowerLegR = ragdollPart('lowerLegR', v(0.06, 0.17, 0.06), v( 0.09, 0.39 + Y, 0), 3);

  // spine + neck
  coneTwist(pelvis, torso, [0, 0.12, 0], [0, -0.21, 0], [0, 1, 0], Math.PI / 8, Math.PI / 8);
  coneTwist(torso, head, [0, 0.22, 0], [0, -0.15, 0], [0, 1, 0], Math.PI / 6, Math.PI / 4);

  // shoulders + elbows
  coneTwist(torso, upperArmL, [-0.19, 0.14, 0], [ 0.16, 0, 0], [1, 0, 0], Math.PI / 3, Math.PI / 8);
  coneTwist(torso, upperArmR, [ 0.19, 0.14, 0], [-0.16, 0, 0], [1, 0, 0], Math.PI / 3, Math.PI / 8);
  coneTwist(upperArmL, lowerArmL, [-0.165, 0, 0], [ 0.145, 0, 0], [1, 0, 0], Math.PI / 2.2, Math.PI / 12);
  coneTwist(upperArmR, lowerArmR, [ 0.165, 0, 0], [-0.145, 0, 0], [1, 0, 0], Math.PI / 2.2, Math.PI / 12);

  // hips + knees
  coneTwist(pelvis, upperLegL, [-0.09, -0.12, 0], [0, 0.18, 0], [0, 1, 0], Math.PI / 4, Math.PI / 8);
  coneTwist(pelvis, upperLegR, [ 0.09, -0.12, 0], [0, 0.18, 0], [0, 1, 0], Math.PI / 4, Math.PI / 8);
  coneTwist(upperLegL, lowerLegL, [0, -0.18, 0], [0, 0.18, 0], [0, 1, 0], Math.PI / 3, Math.PI / 12);
  coneTwist(upperLegR, lowerLegR, [0, -0.18, 0], [0, 0.18, 0], [0, 1, 0], Math.PI / 3, Math.PI / 12);

  freezeRagdoll();
}

function destroyRagdoll() {
  for (const joint of ragdoll.joints) world.removeConstraint(joint);
  for (const part of [...ragdoll.parts]) unlink(part);
  ragdoll = { parts: [], joints: [] };
  partByName = {};
}

buildRagdoll();
updateStatus();

// ---------- props ----------
const woodMaterials = [0xc98a4b, 0xb97a3e, 0xd49a5c].map(
  (c) => new THREE.MeshStandardMaterial({ color: c, roughness: 0.8 })
);
const ballMaterial = new THREE.MeshStandardMaterial({ color: 0x7a8fb5, roughness: 0.5 });

function spawnProp(def, position, velocity = null, angularVelocity = null) {
  const shape = def.shape === 'sphere' ? 'sphere' : 'box';
  const size = Math.min(Math.max(def.size ?? 0.45, 0.02), 3);
  const mass = Math.min(Math.max(def.mass ?? 10, 0.01), 1000);
  let cShape, geometry;
  if (shape === 'sphere') {
    const r = size / 2;
    cShape = new CANNON.Sphere(r);
    geometry = new THREE.SphereGeometry(r, 20, 14);
  } else {
    const h = size / 2;
    cShape = new CANNON.Box(new CANNON.Vec3(h, h, h));
    geometry = new RoundedBoxGeometry(size, size, size, 3, size * 0.04);
  }
  const body = new CANNON.Body({ mass, shape: cShape, position: new CANNON.Vec3(position.x, position.y, position.z) });
  if (velocity) body.velocity.set(velocity.x, velocity.y, velocity.z);
  if (angularVelocity) body.angularVelocity.set(angularVelocity.x, angularVelocity.y, angularVelocity.z);
  body.isProp = true;
  const material = shape === 'sphere' ? ballMaterial : woodMaterials[propCounter % woodMaterials.length];
  const entry = link(body, new THREE.Mesh(geometry, material));
  entry.id = `${shape}_${++propCounter}`;
  entry.shape = shape;
  entry.size = size;
  props.push(entry);
  return entry;
}

function resetScene() {
  stopPlayAll(); // don't let a running sequence advance into a torn-down scene
  for (const prop of [...props]) unlink(prop);
  props = [];
  destroyRagdoll();
  buildRagdoll();
  lastBatch = null;
  document.getElementById('results').hidden = true;
}

document.getElementById('reset').addEventListener('click', () => { if (!busy) resetScene(); });
document.getElementById('camIso').addEventListener('click', setIsometricView);
document.getElementById('camFree').addEventListener('click', setFreeView);

const bounceSlider = document.getElementById('bounce');
const bounceVal = document.getElementById('bounceVal');
bounceSlider.addEventListener('input', () => {
  const v = parseFloat(bounceSlider.value);
  world.defaultContactMaterial.restitution = v;
  bounceVal.textContent = v.toFixed(2);
});

// ---------- scene inventory (what the LLM "sees") ----------
function sceneInventory() {
  const r3 = (v) => [+v.x.toFixed(2), +v.y.toFixed(2), +v.z.toFixed(2)];
  return {
    mannequin: {
      standing,
      heightMeters: 1.6,
      position: r3(partByName.pelvis.body.position),
      targetableParts: ['head', 'torso', 'pelvis'],
    },
    props: props.map((p) => ({ id: p.id, shape: p.shape, sizeMeters: p.size, massKg: p.body.mass, position: r3(p.body.position) })),
  };
}

// ---------- snapshot / restore ----------
function snapshot() {
  return {
    standing,
    entries: dynamic.map((e) => ({
      e,
      pos: e.body.position.clone(),
      quat: e.body.quaternion.clone(),
      vel: e.body.velocity.clone(),
      avel: e.body.angularVelocity.clone(),
      type: e.body.type,
      mass: e.body.mass,
    })),
  };
}

function restore(snap) {
  for (const e of [...dynamic]) {
    if (!snap.entries.some((r) => r.e === e)) {
      const i = props.indexOf(e);
      if (i !== -1) props.splice(i, 1);
      unlink(e);
    }
  }
  for (const r of snap.entries) {
    const b = r.e.body;
    b.position.copy(r.pos);
    b.quaternion.copy(r.quat);
    b.velocity.copy(r.vel);
    b.angularVelocity.copy(r.avel);
    b.force.set(0, 0, 0);
    b.torque.set(0, 0, 0);
    b.mass = r.mass;
    b.type = r.type;
    b.updateMassProperties();
    b.wakeUp();
    r.e.mesh.position.copy(b.position);
    r.e.mesh.quaternion.copy(b.quaternion);
  }
  standing = snap.standing;
  updateStatus();
}

// ---------- actions ----------
function getTargetPoint(target) {
  if (Array.isArray(target) && target.length === 3) return new CANNON.Vec3(target[0], target[1], target[2]);
  const part = partByName[target] || partByName.torso;
  return part.body.position.clone();
}

function jitterDirection(dir, deg, rng) {
  if (!deg) return dir;
  const angle = (deg * Math.PI / 180) * rng();
  const azimuth = rng() * Math.PI * 2;
  const up = Math.abs(dir.y) < 0.99 ? new CANNON.Vec3(0, 1, 0) : new CANNON.Vec3(1, 0, 0);
  const u = dir.cross(up); u.normalize();
  const w = dir.cross(u); w.normalize();
  const s = Math.sin(angle), c = Math.cos(angle);
  const out = new CANNON.Vec3(
    dir.x * c + (u.x * Math.cos(azimuth) + w.x * Math.sin(azimuth)) * s,
    dir.y * c + (u.y * Math.cos(azimuth) + w.y * Math.sin(azimuth)) * s,
    dir.z * c + (u.z * Math.cos(azimuth) + w.z * Math.sin(azimuth)) * s
  );
  out.normalize();
  return out;
}

// Where an inline-defined thrown object spawns. Deterministic by default — the SAME spot
// every run — so a sweep/batch changes only what you asked to change. Randomized only when
// the command explicitly wanted varied directions (reseed) and no fixed origin was given.
//   spec.origin: [x,y,z]  absolute world position
//              | {azimuth: <deg around target>, dist: <m>, height: <m>}  polar around target
//              | absent   → fixed default (azimuth 0°, 3.5 m out, 1.4 m up)
function throwOrigin(spec, target, i, rng) {
  const o = spec.origin;
  if (Array.isArray(o) && o.length === 3) return { x: o[0], y: o[1] + i * 0.6, z: o[2] };
  const dist = o?.dist ?? 3.5;
  const height = o?.height ?? 1.4;
  const az = o?.azimuth != null ? o.azimuth * Math.PI / 180
           : spec.reseed ? rng() * Math.PI * 2   // opt-in scatter ("from a random direction")
           : 0;                                    // fixed default: identical start every run
  return {
    x: target.x + Math.cos(az) * dist,
    y: height + i * 0.6,
    z: target.z + Math.sin(az) * dist,
  };
}

function applyAction(spec, rng) {
  const target = getTargetPoint(spec.target);
  const jitter = spec.jitterDeg ?? 3;

  if (spec.action === 'throw') {
    const count = Math.min(spec.count ?? 1, 50);
    for (let i = 0; i < count; i++) {
      let entry = spec.object && spec.object.id ? props.find((p) => p.id === spec.object.id) : null;
      if (!entry) entry = spawnProp(spec.object ?? {}, throwOrigin(spec, target, i, rng));
      const body = entry.body;
      // Number(...) || 15 turns a missing value, or a non-numeric one (e.g. a stray
      // [from,to] array that wasn't caught as a sweep), into a sane default instead of NaN.
      const speed = Math.min(Math.max(Number(spec.speed) || 15, 0.5), 150);
      const dxz = Math.hypot(target.x - body.position.x, target.z - body.position.z);
      const aim = target.clone();
      aim.y += 9.82 * dxz * dxz / (2 * speed * speed); // flat-fire ballistic lead
      let dir = aim.vsub(body.position);
      dir.normalize();
      dir = jitterDirection(dir, jitter, rng);
      body.velocity.set(dir.x * speed, dir.y * speed, dir.z * speed);
      body.angularVelocity.set((rng() - 0.5) * 8, (rng() - 0.5) * 8, (rng() - 0.5) * 8);
      body.wakeUp();
    }
  } else if (spec.action === 'drop') {
    const count = Math.min(spec.count ?? 1, 100);
    const size = (spec.object && spec.object.size) || 0.3;
    const spread = 0.2 + jitter * 0.03;
    const height = Number(spec.height) || 3.5; // guard against a stray non-numeric value
    for (let i = 0; i < count; i++) {
      spawnProp(spec.object ?? {}, {
        x: target.x + (rng() - 0.5) * 2 * spread,
        y: height + i * (size + 0.15),
        z: target.z + (rng() - 0.5) * 2 * spread,
      }, null, { x: (rng() - 0.5) * 2, y: (rng() - 0.5) * 2, z: (rng() - 0.5) * 2 });
    }
  }
}

// ---------- parameter sweep ----------
// A sweep runs the SAME scenario while stepping ONE parameter from `from` to `to` across
// `steps` runs (run 0 = from, last run = to, linear). Unlike a plain batch (which varies
// only the RNG seed to get a distribution at one setting), a sweep isolates one variable —
// so every run shares a single seed and only the swept value moves between them.
const lerp = (a, b, t) => a + (b - a) * t;
const SWEEP_UNITS = { speed: 'm/s', height: 'm', count: '', jitterDeg: '°', duration: 's', mass: 'kg', size: 'm' };
const SWEEPABLE = ['speed', 'height', 'count'];

// A sweep in either spelling: the explicit {param, from, to, steps} object, OR the shorthand
// the interpreter keeps emitting — a [from, to] array on a sweepable field, e.g.
// "speed": [0.447, 44.7]. The shorthand takes its step count from `runs`. Returns null when
// there is no sweep. (Accepting the array is what stops it from coercing to NaN downstream.)
function activeSweep(spec) {
  if (!spec) return null;
  const s = spec.sweep;
  if (s && s.param && s.steps > 1) return s;
  for (const param of SWEEPABLE) {
    const v = spec[param];
    if (Array.isArray(v) && v.length >= 2) {
      const steps = Math.max(2, Math.min(spec.runs ?? v.length, 1000));
      return { param, from: +v[0], to: +v[v.length - 1], steps };
    }
  }
  return null;
}

// The swept value at run `idx` (0-based). `count` is rounded — you can't throw 3.4 boxes.
function sweepValueAt(s, idx) {
  const v = lerp(s.from, s.to, s.steps > 1 ? idx / (s.steps - 1) : 0);
  return s.param === 'count' ? Math.round(v) : v;
}

// The spec for a single run: the base spec with the swept parameter overridden. `mass`/`size`
// live inside `object`; everything else is a top-level field applyAction/runHeadless reads.
function effectiveSpec(spec, idx) {
  const s = activeSweep(spec);
  if (!s) return spec;
  const v = sweepValueAt(s, idx);
  const eff = { ...spec };
  if (s.param === 'mass' || s.param === 'size') eff.object = { ...(spec.object || {}), [s.param]: v };
  else eff[s.param] = v;
  return eff;
}

function fmtSweep(param, v) {
  const u = SWEEP_UNITS[param] ?? '';
  const digits = param === 'count' ? 0 : (Math.abs(v) < 10 ? 1 : 0);
  return `${(+v).toFixed(digits)}${u ? ' ' + u : ''}`;
}

// ---------- batch simulation ----------
function runHeadless(spec, seed, baseSnap) {
  restore(baseSnap);
  const rng = mulberry32(seed);
  metricsRec = { t: 0, firstHitT: null, maxImpact: 0, releasedAt: null };
  applyAction(spec, rng);
  const steps = Math.round((spec.duration ?? 6) * 60);
  const head = partByName.head.body;
  let toppledAt = null;
  for (let i = 0; i < steps; i++) {
    world.step(1 / 60);
    metricsRec.t = (i + 1) / 60;
    if (toppledAt === null && head.position.y < 0.8) toppledAt = metricsRec.t;
  }
  const m = metricsRec;
  metricsRec = null;
  return {
    seed,
    hit: m.firstHitT !== null,
    firstHitT: m.firstHitT,
    maxImpact: m.maxImpact,
    toppledAt,
    finalHeadY: head.position.y,
  };
}

const nextFrame = () => new Promise(requestAnimationFrame);
const batchStatusEl = document.getElementById('batchStatus');

async function runBatch(spec, command = '') {
  busy = true;
  document.getElementById('results').hidden = false;
  document.getElementById('savedList').hidden = true;
  const baseSnap = snapshot();
  const results = [];
  const sweep = activeSweep(spec);
  const runs = Math.min(Math.max((sweep ? sweep.steps : spec.runs) ?? 1, 1), 1000);
  // When the command asked for random/varied aim, start the seed range at a fresh
  // random offset so each new batch explores new layouts. Each run still gets a
  // distinct seed that we store on its result, so click-to-replay stays bit-exact.
  // A sweep instead pins ONE seed across all runs, so the swept value is the only thing
  // that changes — runs are addressed by index, not seed (seeds may repeat here).
  const seedBase = spec.reseed ? Math.floor(Math.random() * 0x40000000) : 0;
  for (let i = 1; i <= runs; i++) {
    const idx = i - 1;
    const seed = sweep ? seedBase + 1 : seedBase + i;
    const r = runHeadless(effectiveSpec(spec, idx), seed, baseSnap);
    if (sweep) r.sweepValue = sweepValueAt(sweep, idx);
    results.push(r);
    if (i % 5 === 0 || i === runs) {
      batchStatusEl.textContent = `Simulating ${i}/${runs}…`;
      await nextFrame();
    }
  }
  restore(baseSnap);
  lastBatch = { spec, baseSnap, results };
  busy = false;
  saveTest(command, spec, results);
  renderResults();
}

function replayRun(idx) {
  if (!lastBatch || busy) return;
  const r = lastBatch.results[idx];
  if (!r) return;
  stopPlayAll(); // a manual click takes over from any running sequence
  const eff = effectiveSpec(lastBatch.spec, idx);
  restore(lastBatch.baseSnap);
  applyAction(eff, mulberry32(r.seed));
  replayStepsLeft = Math.round((eff.duration ?? 6) * 60);
}

// ---------- "play all": replay every run back-to-back, each until it settles ----------
const PLAY_REST_VEL = 0.08;       // m/s — below this a dynamic body counts as still
const PLAY_REST_ANG = 0.15;       // rad/s — angular equivalent
const PLAY_SETTLE_FRAMES = 30;    // ~0.5s of continuous stillness before we advance
const PLAY_MIN_FRAMES = 20;       // let the motion get going before testing for rest
const PLAY_MAX_FRAMES = 60 * 12;  // hard cap (~12s) so a rolling ball never stalls the queue

// True once every moving (dynamic) body has effectively stopped. A standing mannequin
// is STATIC and a slept body reports ~0 velocity, so both correctly read as "at rest".
function worldAtRest() {
  for (const e of dynamic) {
    const b = e.body;
    if (b.type !== CANNON.Body.DYNAMIC || b.mass === 0) continue;
    if (b.velocity.lengthSquared() > PLAY_REST_VEL * PLAY_REST_VEL) return false;
    if (b.angularVelocity.lengthSquared() > PLAY_REST_ANG * PLAY_REST_ANG) return false;
  }
  return true;
}

function beginPlayRun() {
  const idx = playState.idx;
  const r = lastBatch.results[idx];
  restore(lastBatch.baseSnap);
  applyAction(effectiveSpec(lastBatch.spec, idx), mulberry32(r.seed));
  playState.frames = 0;
  playState.restFrames = 0;
  // A positive loopSeconds fixes each run's length; 0 falls back to "play until still".
  playState.limitFrames = loopSeconds > 0 ? Math.round(loopSeconds * 60) : 0;
  const mode = playState.limitFrames ? ` · ${loopSeconds}s` : '';
  const sweep = activeSweep(lastBatch.spec);
  const label = sweep ? `${sweep.param} ${fmtSweep(sweep.param, r.sweepValue)}` : `run ${r.seed}`;
  batchStatusEl.textContent = `Playing ${idx + 1}/${lastBatch.results.length} · ${label}${mode}…`;
  highlightPlayingRow(idx);
}

// Advance one fixed physics step of the current run; when its time is up — a fixed
// timer if set, otherwise once motion settles (with a hard cap) — move to the next seed.
function stepPlayAll() {
  if (!lastBatch) { stopPlayAll(); return; }
  world.step(1 / 60);
  playState.frames++;

  let done;
  if (playState.limitFrames) {
    done = playState.frames >= playState.limitFrames;
  } else {
    if (playState.frames >= PLAY_MIN_FRAMES && worldAtRest()) playState.restFrames++;
    else playState.restFrames = 0;
    done = playState.restFrames >= PLAY_SETTLE_FRAMES || playState.frames >= PLAY_MAX_FRAMES;
  }

  if (done) {
    playState.idx++;
    if (playState.idx >= lastBatch.results.length) stopPlayAll(true);
    else beginPlayRun();
  }
}

function playAllRuns() {
  if (!lastBatch || busy || !lastBatch.results.length) return;
  replayStepsLeft = 0; // supersede any single replay in flight
  playState = { idx: 0, frames: 0, restFrames: 0 };
  const btn = document.getElementById('playAll');
  if (btn) { btn.textContent = '■ Stop'; btn.classList.add('stop'); }
  beginPlayRun();
}

function stopPlayAll(finished = false) {
  if (!playState) return;
  playState = null;
  clearPlayingHighlight();
  const btn = document.getElementById('playAll');
  if (btn) { btn.textContent = '▶ Play all'; btn.classList.remove('stop'); }
  batchStatusEl.textContent = finished ? 'Playback complete.' : (lastBatch?.spec?.note || '');
}

function togglePlayAll() {
  if (playState) stopPlayAll();
  else playAllRuns();
}

function highlightPlayingRow(idx) {
  clearPlayingHighlight();
  const row = document.querySelector(`#runsTable .run[data-idx="${idx}"]`);
  if (row) { row.classList.add('playing'); row.scrollIntoView({ block: 'nearest' }); }
}

function clearPlayingHighlight() {
  for (const r of document.querySelectorAll('#runsTable .run.playing')) r.classList.remove('playing');
}

function renderResults() {
  stopPlayAll(); // the summary button and table rows are about to be rebuilt
  const { spec, results } = lastBatch;

  const sweep = activeSweep(spec);
  batchStatusEl.textContent = spec.note || '';
  const sweepNote = sweep
    ? `<div class="sweepnote">Sweep: ${sweep.param} ${fmtSweep(sweep.param, sweep.from)} → ${fmtSweep(sweep.param, sweep.to)} · ${sweep.steps} runs</div>`
    : '';
  document.getElementById('summary').innerHTML =
    sweepNote +
    `<button id="playAll" class="playall" title="Replay every run back-to-back">▶ Play all</button>` +
    `<label class="looplen" title="Seconds each run plays before advancing — blank = play until it stops moving">` +
    `<input id="loopSecs" type="number" min="0" step="0.5" value="${loopSeconds || ''}" placeholder="auto"/> s/run</label>`;
  document.getElementById('playAll').addEventListener('click', togglePlayAll);
  document.getElementById('loopSecs').addEventListener('input', (e) => {
    loopSeconds = Math.max(0, +e.target.value || 0);
  });

  const table = document.getElementById('runsTable');
  table.innerHTML = results.map((r, idx) => {
    const label = sweep ? `<span class="sw">${fmtSweep(sweep.param, r.sweepValue)}</span>` : `<span>#${r.seed}</span>`;
    return `<div class="run" data-idx="${idx}">
       ${label}
       <span class="tag ${r.hit ? '' : 'no'}">${r.hit ? `hit ${r.maxImpact.toFixed(1)} m/s` : 'miss'}</span>
       <span class="tag ${r.toppledAt !== null ? '' : 'no'}">${r.toppledAt !== null ? `fell @${r.toppledAt.toFixed(2)}s` : 'stood'}</span>
     </div>`;
  }).join('');
  for (const row of table.querySelectorAll('.run')) {
    row.addEventListener('click', () => replayRun(+row.dataset.idx));
  }
}

// ---------- LLM command box ----------
const cmdEl = document.getElementById('cmd');
const interpretBtn = document.getElementById('interpret');
const cmdErrorEl = document.getElementById('cmdError');
const specViewEl = document.getElementById('specView');
const runSpecBtn = document.getElementById('runSpec');
// The command that produced the current spec — kept only as a label for saved tests.
// The spec itself is whatever is in the editable box at run time, so edits win.
let pendingCommand = '';

// Example-command hints: clicking one drops the phrasing into the command box.
for (const a of document.querySelectorAll('#cmdHints a')) {
  a.addEventListener('click', () => { cmdEl.value = a.dataset.fill; cmdEl.focus(); });
}

// "Interpret with AI" only translates the command into a spec and drops it into the
// editable box — it no longer runs the batch. Review/tweak the spec, then hit "Run".
interpretBtn.addEventListener('click', async () => {
  const command = cmdEl.value.trim();
  if (!command || busy) return;
  interpretBtn.disabled = true;
  interpretBtn.textContent = 'Interpreting…';
  cmdErrorEl.hidden = true;
  try {
    const res = await fetch('/interpret', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command, inventory: sceneInventory() }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    pendingCommand = command;
    specViewEl.value = JSON.stringify(data.spec, null, 1);
    specViewEl.hidden = false;
    runSpecBtn.hidden = false;
    specViewEl.focus();
  } catch (err) {
    cmdErrorEl.textContent = 'Interpreter error: ' + err.message +
      '\n(Is the app served by server.py? Run: python3 server.py)';
    cmdErrorEl.hidden = false;
  }
  interpretBtn.disabled = false;
  interpretBtn.textContent = 'Interpret with AI';
});

// Run exactly what's in the box — parse the (possibly hand-edited) JSON and simulate it.
runSpecBtn.addEventListener('click', async () => {
  if (busy) return;
  let spec;
  try {
    spec = JSON.parse(specViewEl.value);
  } catch (err) {
    cmdErrorEl.textContent = 'Spec is not valid JSON: ' + err.message;
    cmdErrorEl.hidden = false;
    return;
  }
  cmdErrorEl.hidden = true;
  runSpecBtn.disabled = true;
  runSpecBtn.textContent = 'Simulating…';
  try {
    await runBatch(spec, pendingCommand || spec.note || '');
  } catch (err) {
    cmdErrorEl.textContent = 'Run error: ' + err.message;
    cmdErrorEl.hidden = false;
  }
  runSpecBtn.disabled = false;
  runSpecBtn.textContent = 'Run this spec ▸';
});

// ---------- local persistence (survive a page refresh, skip re-calling Haiku) ----------
// Each completed batch is stored under this key: { id, savedAt, command, spec, results }.
// The heavy physics snapshot is NOT stored — replay rebuilds it from the live scene on load.
const SAVE_KEY = 'ragdollLabTests';
const SAVE_CAP = 20;
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

function loadSavedTests() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || []; } catch { return []; }
}

function persistSavedTests(list) {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(list));
  } catch {
    if (list.length > 1) persistSavedTests(list.slice(1)); // over quota → drop oldest, retry
  }
}

function saveTest(command, spec, results) {
  const list = loadSavedTests();
  list.push({ id: `${Date.now()}_${Math.floor(Math.random() * 1e6)}`, savedAt: Date.now(), command, spec, results });
  while (list.length > SAVE_CAP) list.shift();
  persistSavedTests(list);
}

function deleteSavedTest(id) {
  persistSavedTests(loadSavedTests().filter((t) => t.id !== id));
  renderSavedList();
}

function applySavedTest(id) {
  if (busy) return;
  const test = loadSavedTests().find((t) => t.id === id);
  if (!test) return;
  // Rebuild the replay base from whatever is in the scene right now (default scene after a
  // refresh). Stored per-run seeds still reproduce each run against that base.
  lastBatch = { spec: test.spec, baseSnap: snapshot(), results: test.results };
  pendingCommand = test.command || '';
  specViewEl.value = JSON.stringify(test.spec, null, 1);
  specViewEl.hidden = false;
  runSpecBtn.hidden = false;
  renderResults();
}

function renderSavedList() {
  const el = document.getElementById('savedList');
  const list = loadSavedTests().slice().reverse(); // newest first
  if (!list.length) {
    el.innerHTML = '<div class="hint"><span>No saved tests yet — run one first.</span></div>';
    return;
  }
  el.innerHTML =
    '<div class="hint"><span>Saved tests — click to load</span><a data-clear="1">Clear all</a></div>' +
    list.map((t) => {
      const topples = t.results.filter((r) => r.toppledAt !== null).length;
      const label = esc((t.command || t.spec.note || t.spec.action || 'test').slice(0, 42));
      const when = new Date(t.savedAt).toLocaleString();
      return `<div class="run saved" data-id="${t.id}">
        <span title="${esc(t.command || '')}">${label}</span>
        <span class="tag">${t.results.length}× · ${topples}⬇ <span class="when">${esc(when)}</span></span>
        <button class="del" data-id="${t.id}" title="Delete">×</button>
      </div>`;
    }).join('');
  el.querySelector('[data-clear]')?.addEventListener('click', () => {
    persistSavedTests([]);
    renderSavedList();
  });
  for (const row of el.querySelectorAll('.run.saved')) {
    row.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) { deleteSavedTest(e.target.dataset.id); return; }
      applySavedTest(row.dataset.id);
    });
  }
}

document.getElementById('loadTests').addEventListener('click', () => {
  const savedList = document.getElementById('savedList');
  document.getElementById('results').hidden = false;
  const show = savedList.hidden;
  savedList.hidden = !show;
  if (show) renderSavedList();
});

// ---------- click to shove the ragdoll ----------
const raycaster = new THREE.Raycaster();
renderer.domElement.addEventListener('pointerdown', (event) => {
  if (busy) return;
  raycaster.setFromCamera(
    new THREE.Vector2((event.clientX / innerWidth) * 2 - 1, -(event.clientY / innerHeight) * 2 + 1),
    camera
  );
  const hits = raycaster.intersectObjects(ragdoll.parts.map((p) => p.mesh));
  if (!hits.length) return;
  const hit = hits[0];
  const part = ragdoll.parts.find((p) => p.mesh === hit.object);
  const dir = raycaster.ray.direction;
  releaseRagdoll();
  part.body.wakeUp();
  part.body.applyImpulse(
    new CANNON.Vec3(dir.x * 25, dir.y * 25 + 5, dir.z * 25),
    new CANNON.Vec3(hit.point.x, hit.point.y, hit.point.z)
  );
});

// ---------- main loop ----------
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  if (busy) {
    // batch owns the world; just render whatever state it's in
  } else if (playState) {
    stepPlayAll(); // walk the whole run list, each played until its motion settles
  } else if (replayStepsLeft > 0) {
    world.step(1 / 60); // fixed-step so replays match the headless run exactly
    replayStepsLeft--;
  } else {
    world.step(1 / 60, dt, 3);
  }
  for (const { body, mesh } of dynamic) {
    mesh.position.copy(body.position);
    mesh.quaternion.copy(body.quaternion);
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
